# BSPAR config for ASQP-Rest15
task_type: asqp
dataset_name: asqp_rest15
num_categories: 12
num_sentiments: 3

# Encoder
model_name: xlm-roberta-base
finetune_encoder: true

# Span Proposal
max_span_length: 8
span_repr_size: 256
width_embedding_dim: 32
top_k_aspects: 20
top_k_opinions: 20

# Pair Module
dist_buckets: 16
top_c_categories: 3

# Reranker
cat_embedding_dim: 32
aff_embedding_dim: 32
num_meta_features: 9

# Loss
lambda_span: 1.0
lambda_pair: 1.0
lambda_cat: 1.0
lambda_aff: 0.5
lambda_rank: 1.0
focal_alpha: 0.25
focal_gamma: 2.0
hard_neg_weight: 3.0
ranking_margin: 1.0
pair_pos_weight: 8.0
pair_easy_neg_weight: 1.0
pair_span_nearmiss_weight: 2.0
pair_cat_confused_weight: 3.0
pair_focal_gamma: 1.0

# Decode
stage1_pair_retention_strategy: topn_only
stage1_pair_top_n: 20
stage1_pair_score_threshold: 0.001
stage1_decode_pair_score_threshold: null

# Training
encoder_lr: 2.0e-5
head_lr: 5.0e-5
reranker_lr: 5.0e-4
weight_decay: 0.01
warmup_ratio: 0.1
stage1_epochs: 20
stage2_epochs: 10
batch_size: 8
gradient_accumulation: 2
max_grad_norm: 1.0
patience: 8
stage1_ckpt_metric: composite
stage1_ckpt_quad_weight: 0.6
stage1_ckpt_pair_recall_weight: 0.25
stage1_ckpt_pos_ratio_weight: 0.15

# Teacher Forcing Schedule
gold_injection_start: 1.0
gold_injection_end: 0.0
gold_injection_warmup: 2

# Data
data_dir: data/asqp_rest15
train_file: train.txt
dev_file: dev.txt
test_file: test.txt
data_format: auto

# Output
output_dir: outputs/asqp_rest15_phase3_paircal

# Seeds
seeds:
  - 42
  - 123
  - 456
  - 789
  - 1024

# Stage-2 Group Loss Ablation
stage2_use_group_loss: true
stage2_group_loss_lambda: 0.5
stage2_group_tau: 1.0
