# BSPAR config for ASQP-Rest16
task_type: asqp
dataset_name: asqp_rest16
num_categories: 12
num_sentiments: 3

# Encoder
model_name: xlm-roberta-base
finetune_encoder: true

# Span Proposal
max_span_length: 8
span_repr_size: 256
width_embedding_dim: 32
top_k_aspects: 20
top_k_opinions: 20

# Pair Module
dist_buckets: 16
top_c_categories: 3

# Reranker
cat_embedding_dim: 32
aff_embedding_dim: 32
num_meta_features: 9

# Loss
lambda_span: 1.0
lambda_pair: 1.0
lambda_cat: 1.0
lambda_aff: 0.5
lambda_rank: 1.0
focal_alpha: 0.25
focal_gamma: 2.0
hard_neg_weight: 3.0
ranking_margin: 1.0

# Decode
stage1_pair_score_threshold: 0.01

# Training
encoder_lr: 2.0e-5
head_lr: 1.0e-4
reranker_lr: 5.0e-4
weight_decay: 0.01
warmup_ratio: 0.1
stage1_epochs: 20
stage2_epochs: 10
batch_size: 8
gradient_accumulation: 2
max_grad_norm: 1.0
patience: 5

# Data
data_dir: data/asqp_rest16
train_file: train.txt
dev_file: dev.txt
test_file: test.txt
data_format: auto

# Output
output_dir: outputs/asqp_rest16

# Seeds
seeds:
  - 42
  - 123
  - 456
  - 789
  - 1024
